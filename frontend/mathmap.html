<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map of Mathematics - Euclid's Window</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1" />
    <link rel="stylesheet" href="mathmap.css?v=20260721-1" />
    <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  </head>
  <body>
    <header class="header">
      <a href="index.html" class="brand">← Euclid's Window</a>
      <h1>The Map of Mathematics</h1>
      <p class="subtitle">Click any topic to explore learning prompts</p>
    </header>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search topics..." />
      <div id="search-results" class="search-results hidden"></div>
    </div>

    <div class="view-toggle">
      <button id="view-categories" class="toggle-btn active">&#9707; Categories</button>
      <button id="view-graph" class="toggle-btn">&#9672; Concept Graph</button>
    </div>

    <div id="graph-view" class="graph-view hidden">
      <div class="graph-toolbar">
        <input type="text" id="graph-search" placeholder="Highlight a concept…" />
        <span class="graph-hint">Drag to move &middot; scroll to zoom &middot; hover to see links &middot; click a node to open its lesson</span>
      </div>
      <svg id="concept-graph-svg" class="concept-graph-svg"></svg>
    </div>

    <main class="map-container" id="map-container">
      <!-- Categories will be rendered here -->
    </main>

    <!-- Topic Modal -->
    <div id="topic-modal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="modal-close">&times;</button>
        <div class="modal-header">
          <span class="modal-icon" id="modal-icon"></span>
          <h2 id="modal-title"></h2>
        </div>
        <p class="modal-category" id="modal-category"></p>
        <h3>Explore this topic:</h3>
        <div class="prompts-list" id="prompts-list"></div>
      </div>
    </div>

    <!-- Explanation Modal -->
    <div id="explanation-modal" class="modal hidden">
      <div class="modal-content explanation-content">
        <button class="modal-close" id="explanation-close">&times;</button>
        <h2 id="explanation-title"></h2>
        <div class="explanation-text" id="explanation-text">
          <div class="loading-spinner"></div>
          <p>Generating explanation...</p>
        </div>
        <div class="explanation-actions">
          <button class="btn-secondary" id="back-to-prompts">← Back to prompts</button>
          <button class="btn-primary" id="continue-chat">Continue in Chat →</button>
        </div>
      </div>
    </div>

    <script src="vendor/katex/katex.min.js"></script>
    <script src="vendor/katex/auto-render.min.js"></script>
    <script src="vendor/d3.min.js"></script>
    <script src="mathmap.js"></script>
    <script src="graphmap.js?v=20260721-1"></script>
  </body>
</html>
