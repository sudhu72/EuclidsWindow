services:
  euclids-window:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-8010}:8000"
    environment:
      LOCAL_AI_ENABLED: "true"
      LOCAL_LLM_PROVIDER: "ollama"
      LOCAL_LLM_MODEL: "qwen2.5:1.5b"
      LOCAL_POLYA_MODEL: "${LOCAL_POLYA_MODEL:-qwen3:4b-instruct}"
      LOCAL_POLYA_OLYMPIAD_MODEL: "${LOCAL_POLYA_OLYMPIAD_MODEL:-qwen3:8b}"
      LOCAL_DISCOVER_MODEL: "${LOCAL_DISCOVER_MODEL:-qwen3:8b}"
      # Voicebox voice sidecar runs on the HOST; reach it via host.docker.internal.
      VOICEBOX_URL: "${VOICEBOX_URL:-http://host.docker.internal:17493}"
      LOCAL_LLM_TIMEOUT_SECONDS: "120"
      LOCAL_AI_EXECUTION_TIMEOUT_SECONDS: "60"
      LOCAL_LLM_BASE_URL: "${LOCAL_LLM_BASE_URL:-http://ollama:11434}"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./backend/static:/app/backend/static
      - context-db:/app/backend/data/context_db

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    environment:
      # Authenticates the daemon for Ollama Cloud (:cloud) models. Leave unset
      # to run fully local/offline. Put the real key in .env (gitignored), never
      # here. Get one at https://ollama.com/settings/keys
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  ollama-data:
  context-db:
